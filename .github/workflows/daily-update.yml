name: Update arXiv Optics Daily

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  schedule:
    - cron: "30 2 * * 1-5" # Runs at 02:30 UTC, Monday through Friday

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to prevent "non-fast-forward" errors during push
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Generate daily page
        # Map the GitHub Secret to an environment variable the Python script can read
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -u tools/generate_arxiv_optics_daily.py

      - name: Commit and Sync generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. Stage the changes FIRST so Git knows they are safe
          git add optics_daily index.html
          
          # 2. Stash or commit them temporarily to allow the pull
          # We'll use a temporary commit to make the rebase possible
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Temp commit for sync"
            
            # 3. Pull and rebase to stay in sync with remote
            git pull origin main --rebase
            
            # 4. Amend the commit to keep the history clean (optional)
            git commit --amend -m "Update arXiv optics daily report" --no-edit
            
            # 5. Push the final result
            git push origin main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -R optics_daily _site/optics_daily

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
